<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Calculator </title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- main div stars her -->
    <div class="main">
        <form action="">
            <!-- input screen code  -->
            <div>
                <input type="text" name="op" class="op">
            </div>
            <!-- code for keys on calculator  -->
            <div class="keys">
                <!-- first row of keys  -->
                <div>
                    <input type="button" name="AC" value="AC" onclick="op.value=''" class="oper">
                    <input type="button" name="C" value="C" onclick="op.value=''" class="oper">
                    <input type="button" name="operator" value="%" onclick="op.value+='%'" class="oper">
                    <input type="button" name="operator" value="/" onclick="op.value+='/'" class="oper">
                </div>
                <!-- second row of keys  -->

                <div>
                    <input type="button" name="number" value="9" onclick="op.value+='9'" class="one">
                    <input type="button" name="number" value="8" onclick="op.value+='8'" class="one">
                    <input type="button" name="number" value="7" onclick="op.value+='7'" class="one">
                    <input type="button" name="operator" value="*" onclick="op.value+='*'" class="oper">
                </div>
                <!-- third row of keys  -->

                <div>
                    <input type="button" name="number" value="4" onclick="op.value+='4'" class="one">
                    <input type="button" name="number" value="5" onclick="op.value+='5'" class="one">
                    <input type="button" name="number" value="6" onclick="op.value+='6'" class="one">
                    <input type="button" name="operator" value="-" onclick="op.value+='-'" class="oper">
                </div>
                <!-- forth row of keys  -->

                <div>
                    <input type="button" name="number" value="1" onclick="op.value+='1'" class="one">
                    <input type="button" name="number" value="2" onclick="op.value+='2'" class="one">
                    <input type="button" name="number" value="3" onclick="op.value+='3'" class="one">
                    <input type="button" name="operator" value="+" onclick="op.value+='+'" class="oper">
                </div>
                <!-- fi row of keys  -->

                <div>
                    <input type="button" name="number" value="0" onclick="op.value+='0'" class="zero">
                    <input type="button" name="." value="." onclick="op.value+='.'" class="one">
                    <input type="button" name="=" value="=" onclick="op.value=eval(op.value)" class="oper">
                </div>
        </form>
    </div>
    </div>
</body>

</html>
